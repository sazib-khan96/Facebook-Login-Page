<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Login</title>
    <!-- style sheet link up  -->
    <link rel="stylesheet" href="/style.css">
    <!-- small device css link up -->
     <link rel="stylesheet" href="./responsive/Small_devices.css">

    <!-- Google Font Added -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <section>
        <div class="fa_page">
            <div class="left_container">
                <h1>Facebook</h1>
                <p>Facebook helps you connect and share
                    with the people in your life</p>
            </div>
            <div class="login_info">
                <form action="">
                    <input type="text" placeholder="Email address or phone number required">
                    <input type="password" placeholder="Password">
                    <input type="button" value="Log in">
                    <div class="forgot_password">
                        <a href="#">Forgotten Password</a>
                    </div>
                    <div class="create_account">
                        <button><a href="#">Create new account</a></button>
                    </div>
                </form>
            </div>
        </div>
    </section>
</body>

</html>
